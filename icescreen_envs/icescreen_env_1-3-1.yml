name: icescreen_env_1-3-1
channels:
    - conda-forge
    - bioconda
dependencies:
    - python
    - pandas >=2.1.0
    - snakemake-minimal >=7.32
    - biopython =1.81
    - bcbio-gff =0.7.0
    - blast =2.12
    - hmmer =3.3.2

# Remarks:
# april 2023, python 3.11 not yet supported by other packages. Specifying a specific version of python may lead to error while processed by conda build.

# for the conda meta.yaml, only python, blast, and hmmer are required in the host section but all the requirements of the run section have been addded to account for homogenous version between host and run.


