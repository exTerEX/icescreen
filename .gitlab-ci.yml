image: ubuntu:latest

before_script:

  - apt-get -yq update
  - apt-get -yq upgrade
  - apt-get -yq install git wget curl build-essential xz-utils
  - source ~/.bashrc
  - wget -O Miniforge3.sh "https://github.com/conda-forge/miniforge/releases/latest/download/Miniforge3-$(uname)-$(uname -m).sh"
  - bash Miniforge3.sh -b -p "${HOME}/conda"
  - source "${HOME}/conda/etc/profile.d/conda.sh"
  - source "${HOME}/conda/etc/profile.d/mamba.sh"
  - conda activate
  - conda create -y --name icescreen_env_1-3-3 icescreen -c conda-forge -c bioconda

test_install_icescreen:
  script:
  - conda activate icescreen_env_1-3-3
  - icescreen --version
  - icescreen --print_version_dependencies
  - icescreen --test_installation
  - icescreen --test_installation 2>&1 | grep "The installation of ICEscreen is successful" > /dev/null
  - mkdir -p ~/tmp/test_icescreen
  - cd ~/tmp/test_icescreen
  - mkdir genbank_files
  - i=NC_004668
  - curl -s  "https://eutils.ncbi.nlm.nih.gov/entrez/eutils/efetch.fcgi?db=nucleotide&id=${i}&rettype=gbwithparts&retmode=txt" > genbank_files/$i.gbk
  - i=NZ_CP026548
  - curl -s  "https://eutils.ncbi.nlm.nih.gov/entrez/eutils/efetch.fcgi?db=nucleotide&id=${i}&rettype=gbwithparts&retmode=txt" > genbank_files/$i.gbk
  - icescreen -g ~/tmp/test_icescreen/genbank_files -o ~/tmp/test_icescreen/ --mode firmicutes
  - head ~/tmp/test_icescreen/ICEscreen_results/NC_004668/detected_mobile_elements/NC_004668_detected_ME.summary 2>&1 | grep "ICEscreen statistics for genome accession" > /dev/null
  - head ~/tmp/test_icescreen/ICEscreen_results/NZ_CP026548/detected_mobile_elements/NZ_CP026548_detected_ME.summary 2>&1 | grep "ICEscreen statistics for genome accession" > /dev/null
  - rm -rf ~/tmp/test_icescreen
  - conda deactivate
  only:
  - master
  - main
