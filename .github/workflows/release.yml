name: Build and Release Package + Database

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install build

      - name: Build python wheel and sdist
        run: python -m build

      - name: Archive database directory
        run: |
          if [ -d "database" ]; then
            tar -czf icescreen_database.tar.gz database
          else
            echo "Error: ./database directory not found!"
            exit 1
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          draft: false
          prerelease: false
          files: |
            dist/*.whl
            dist/*.tar.gz
            icescreen_database.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
